

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }}</title>
</head>
<body>

    <h1>{{ book.title }}</h1>

    <p>
        <strong>Author:</strong>
        {{ book.author.name }}
    </p>

    <p>
        <strong>Price:</strong>
        {{ book.price }}
    </p>

    <p>
        <strong>Published Date:</strong>
        {{ book.published_date }}
    </p>

    <p>
        <strong>Created:</strong>
        {{ book.created_at }}
    </p>

    <p>
        <strong>Updated:</strong>
        {{ book.updated_at }}
    </p>

    <hr>

    <a href="{% url 'library:book_update' book.pk %}">
        Edit
    </a>

    |

    <a href="{% url 'library:book_delete' book.pk %}">
        Delete
    </a>

    |

    <a href="{% url 'library:book_list' %}">
        Back to Book List
    </a>

</body>
</html>
