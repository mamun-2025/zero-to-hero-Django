

<!DOCTYPE html>
<html>
<head>
   <title>Delete Product</title>
</head>
<body>
   <h1> Delete Product</h1>

   <p>
      Are you sure you want to delete
      <strong>{{ product.name }}</strong>?
   </p>

   <form method="POST">

      {% csrf_token %}

      <button type="submit">
         Yes, Delete
      </button>
   </form>

   <p>
      <a href="{% url 'products:product_detail' product.id %}">
      Cancel
      </a>
   </p>
</body>
</html>
