

<!DOCTYPE html>
<html>
<head>
   <title>Eidt Product</title>
</head>
<body>
   <h1>Eidt Product</h1>

   <form method="POST">

      {% csrf_token %}

      <p>
         <label>Name</label>
         <input type="text" name="name" value="{{ product.name }}">
      </p>

      <p>
         <label>Price</label>
         <input type="number" step="0.01" name="price" value="{{ product.price }}">
      </p>

      <p>
         <label>Stock</label>
         <input type="number" name="stock" value="{{ product.stock }}">
      </p>

      <button type="submit">
         Update Product
      </button>

   </form>
</body>
</html>
