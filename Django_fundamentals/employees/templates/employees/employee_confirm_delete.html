
<!DOCTYPE html>
<html>
<head>
   <title>Employee Delete</title>
</head>
<body>

   <h2>
      Are you sure you want to delete "{{ employee.name }}"?
   </h2>

   <form method="POST">

      {% csrf_token %}

      <button type="submit">
         Yes, Delete 
      </button>

   </form>

   <br>

   <a href="{% url 'employees:employee_detail' employee.pk %}">
      Cancel
   </a>

</html>
</body>
