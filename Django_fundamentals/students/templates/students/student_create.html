

<!DOCTYPE html>
<html>
<head>
   <title> Student Create</title>
</head>
<body>
   <h1>Create Student</h1>

   <form method="POST">
      
      {% csrf_token %}

      <p>
         <label>Name</label>
         <input type="text" name="name" required>
      </p>

      <p>
         <label>Email<label>
         <input type="email" name="email" required>
      </p>

      <p>
         <label>Age</label>
         <input type="number" name="age" min="1" required>
      </p>

      <button type="submit">
         Save Student
      </button>

   </form>

</body>
</html>
